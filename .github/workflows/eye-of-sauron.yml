name: Eye of Sauron CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-scan:
    name: Validate, Scan, Archive
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Eye of Sauron validation
        run: npm run validate

      - name: Run full scan
        run: npm run scan:json

      - name: Archive report
        run: npm run archive

      - name: Run test harness
        run: npm run test

      - name: Push telemetry
        run: npm run telemetry || echo "Telemetry optional, continuing"

      - name: Done
        run: echo "✅ Eye of Sauron CI completed successfully."
